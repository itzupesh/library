name: CI Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [ 17, 21 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Build and run unit tests
        run: mvn clean test -B

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports-jdk${{ matrix.java-version }}
          path: target/surefire-reports/
          retention-days: 14

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        run: mvn clean verify -B -Pci

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-reports
          path: target/failsafe-reports/
          retention-days: 14

  package:
    name: Package & Coverage
    runs-on: ubuntu-latest
    needs: integration-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build, test, and generate coverage
        run: mvn clean verify -B -Pci

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v7
        with:
          name: library-management-system-jar
          path: |
            target/library-management-system-1.0.0.jar
            target/library-management-system-jar-with-dependencies.jar
          retention-days: 30

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-test-reports
          path: target/surefire-reports/
          retention-days: 14

      - name: Print coverage summary
        run: |
          if [ -f target/site/jacoco/index.html ]; then
            echo "=== JaCoCo Coverage Report Generated ==="
            echo "Coverage report available as artifact: jacoco-coverage-report"
          fi
